name: Android CI/CD

on:
  workflow_dispatch:
#push:
#  branches: ["**"]
#  paths-ignore:
#    - "README.md"
#    - "fastlane/**"
#    - "assets/**"
#    - ".github/**/*.md"
#    - ".github/FUNDING.yml"
#    - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: write
  discussions: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Explicit Gradle cache on top of setup-java's built-in cache.
      # Caches the build-cache directory so incremental tasks are skipped.
      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/build-cache-*
          key: gradle-build-cache-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-build-cache-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore
          else
            echo "Release keystore secret is not available. Skipping decoding."
          fi

      # Build all variants in a single Gradle invocation so tasks share the
      # configuration phase, classpath resolution and incremental build cache.
      # --parallel  — lets Gradle run independent subproject tasks concurrently.
      # --build-cache — reuses outputs from previous runs stored above.
      # --no-daemon  — avoids daemon startup overhead inside the ephemeral runner.
      - name: Build all APKs
        run: >
          ./gradlew assembleGithubRelease assembleGithubNightly assembleFossRelease
          --parallel --build-cache --no-daemon --stacktrace --info --scan -Dscan.acceptTos=yes
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-release-apk
          path: app/build/outputs/apk/github/release/app-github-release.apk
          retention-days: 14

      - name: Upload Nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-nightly-apk
          path: app/build/outputs/apk/github/nightly/app-github-nightly.apk
          retention-days: 14

      - name: Upload FOSS Release APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-foss-release-apk
          path: app/build/outputs/apk/foss/release/app-foss-release.apk
          retention-days: 14

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download pre-built APKs from the build job — no recompilation needed.
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: flow-release-apk
          path: dist/

      - name: Download Nightly APK
        uses: actions/download-artifact@v4
        with:
          name: flow-nightly-apk
          path: dist/

      - name: Download FOSS Release APK
        uses: actions/download-artifact@v4
        with:
          name: flow-foss-release-apk
          path: dist/

      - name: Rename APKs for release
        run: |
          mv dist/app-github-release.apk dist/flow.apk
          mv dist/app-github-nightly.apk dist/flow-nightly.apk
          mv dist/app-foss-release.apk dist/flow-foss.apk

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
